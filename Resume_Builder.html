<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder · Live Preview</title>
<style>
  /* ============== Design tokens ============== */
  :root{
    --navy-900:#0a1f44;
    --navy-800:#0f2a5e;
    --navy-700:#16357a;
    --navy-600:#1e4099;
    --navy-500:#2754c4;
    --navy-50:#eef3fc;
    --navy-100:#d9e3f7;
    --accent:#0ea5e9;
    --gold:#d4a24c;
    --gray-900:#1f2937;
    --gray-700:#374151;
    --gray-500:#6b7280;
    --gray-300:#d1d5db;
    --gray-200:#e5e7eb;
    --gray-100:#f3f4f6;
    --bg:#f4f6fa;
    --app-fg:#1f2937;
    --danger:#dc2626;
    --primary:#2754c4;
    --primary-hover:#1e4099;
    --card:#ffffff;
    --shadow:0 4px 20px rgba(15,42,94,0.08);
    --shadow-lg:0 10px 40px rgba(15,42,94,0.12);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,sans-serif;
    background:var(--bg);
    color:var(--app-fg);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }

  /* ============== Top bar ============== */
  .topbar{
    height:56px;background:#fff;border-bottom:1px solid var(--gray-200);
    display:flex;align-items:center;padding:0 20px;gap:14px;
    position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,0.04);
  }
  .topbar .brand{
    font-size:16px;font-weight:700;color:var(--navy-900);
    display:flex;align-items:center;gap:8px;letter-spacing:.3px;
  }
  .topbar .brand .dot{
    width:10px;height:10px;border-radius:50%;
    background:linear-gradient(135deg,var(--gold),#f0c97a);
  }
  .topbar .spacer{flex:1}
  .btn{
    border:1px solid var(--gray-300);background:#fff;color:var(--gray-700);
    padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;
    cursor:pointer;transition:all .15s;
  }
  .btn:hover{background:var(--gray-100);border-color:var(--gray-500)}
  .btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
  .btn.primary:hover{background:var(--primary-hover);border-color:var(--primary-hover)}
  .btn.danger{color:var(--danger);border-color:#f3c0c0;background:#fff5f5}
  .btn.danger:hover{background:#ffe5e5}
  .btn.ghost{background:transparent;border-color:transparent}
  .tab-toggle{display:none}

  /* ============== App shell ============== */
  .app{
    display:grid;grid-template-columns:minmax(380px,42%) 1fr;
    height:calc(100vh - 56px);
  }
  .pane{overflow-y:auto;height:100%}
  .form-pane{background:var(--bg);padding:24px 22px 60px;border-right:1px solid var(--gray-200)}
  .preview-pane{background:#e9eef5;padding:24px;display:flex;justify-content:center;align-items:flex-start}
  .preview-frame{
    background:#fff;
    width:100%;max-width:980px;
    box-shadow:0 8px 40px rgba(15,42,94,0.12);
    border-radius:6px;overflow:hidden;
  }

  /* ============== Form section card ============== */
  .form-section{
    background:#fff;border-radius:10px;padding:20px;
    margin-bottom:18px;box-shadow:var(--shadow);
    border:1px solid var(--gray-100);
  }
  .form-section h3{
    font-size:15px;font-weight:700;color:var(--navy-900);
    margin-bottom:14px;display:flex;align-items:center;gap:8px;
    letter-spacing:.3px;
  }
  .form-section h3 .num{
    font-size:11px;font-weight:600;color:var(--gold);
    font-family:"SF Mono",Menlo,monospace;background:var(--navy-50);
    padding:2px 6px;border-radius:3px;
  }
  .form-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  .form-row.cols-2 > *{flex:1;min-width:120px}
  .form-row.cols-3 > *{flex:1;min-width:90px}
  .form-row.cols-1 > *{flex:1;width:100%}
  .field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px}
  .field label{font-size:11px;font-weight:600;color:var(--gray-700);letter-spacing:.3px;text-transform:uppercase}
  .field input,.field textarea,.field select{
    border:1px solid var(--gray-300);border-radius:6px;
    padding:8px 10px;font-size:13px;font-family:inherit;
    background:#fff;color:var(--gray-900);
    transition:border-color .15s,box-shadow .15s;
  }
  .field input:focus,.field textarea:focus,.field select:focus{
    outline:none;border-color:var(--primary);
    box-shadow:0 0 0 3px rgba(39,84,196,0.12);
  }
  .field textarea{resize:vertical;min-height:90px;line-height:1.5}
  .field .hint{font-size:11px;color:var(--gray-500)}
  .field-row-actions{display:flex;justify-content:flex-end;margin-top:4px}
  .row-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:6px}
  .icon-btn{
    border:1px solid var(--gray-300);background:#fff;color:var(--gray-500);
    width:26px;height:26px;border-radius:5px;cursor:pointer;font-size:14px;
    display:inline-flex;align-items:center;justify-content:center;
    transition:all .15s;
  }
  .icon-btn:hover{color:var(--danger);border-color:#f3c0c0;background:#fff5f5}
  .add-btn{
    background:transparent;color:var(--primary);border:1px dashed var(--primary);
    padding:7px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;
    width:100%;margin-top:8px;transition:all .15s;
  }
  .add-btn:hover{background:var(--navy-50)}

  .item-card{
    background:var(--gray-100);border-radius:8px;padding:12px;
    margin-bottom:10px;border:1px solid var(--gray-200);position:relative;
  }
  .item-card .item-head{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:8px;font-size:12px;font-weight:600;color:var(--navy-800);
  }
  .item-card .item-head .idx{color:var(--gold);font-family:"SF Mono",Menlo,monospace}

  .bullet-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
  .bullet-row input{flex:1}
  .bullet-row .icon-btn{flex-shrink:0}

  .tag-input-row{display:flex;flex-wrap:wrap;gap:6px;padding:6px;border:1px solid var(--gray-300);border-radius:6px;background:#fff;min-height:38px;align-items:center}
  .tag-input-row input{border:none;outline:none;flex:1;min-width:80px;padding:4px;font-size:13px;background:transparent}
  .tag-chip{
    display:inline-flex;align-items:center;gap:4px;background:var(--navy-50);
    color:var(--navy-700);border:1px solid var(--navy-100);border-radius:4px;
    padding:3px 8px;font-size:12px;font-weight:500;
  }
  .tag-chip .x{cursor:pointer;color:var(--gray-500);font-size:14px;line-height:1}
  .tag-chip .x:hover{color:var(--danger)}

  .range-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .range-row input[type=range]{flex:1;accent-color:var(--primary)}
  .range-row .val{width:42px;text-align:right;font-size:12px;font-weight:600;color:var(--navy-800);font-family:"SF Mono",Menlo,monospace}
  .range-row .name-input{flex:1;border:1px solid var(--gray-300);border-radius:5px;padding:6px 8px;font-size:13px;background:#fff}

  /* ============== Preview styles (scoped) ============== */
  .preview-shell{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,sans-serif;color:var(--gray-900);line-height:1.7}
  .preview-shell .container{max-width:1120px;margin:0 auto;padding:0 32px}
  .preview-shell header{
    background:linear-gradient(135deg,var(--navy-900) 0%,var(--navy-700) 60%,var(--navy-500) 100%);
    color:#fff;padding:48px 0 40px;position:relative;overflow:hidden;
  }
  .preview-shell header::before{
    content:"";position:absolute;top:-120px;right:-120px;width:360px;height:360px;
    background:radial-gradient(circle,rgba(255,255,255,0.08) 0%,transparent 70%);border-radius:50%;
  }
  .preview-shell header::after{
    content:"";position:absolute;bottom:-180px;left:-80px;width:420px;height:420px;
    background:radial-gradient(circle,rgba(14,165,233,0.18) 0%,transparent 70%);border-radius:50%;
  }
  .preview-shell .header-inner{
    display:flex;align-items:center;gap:32px;position:relative;z-index:1;flex-wrap:wrap;
  }
  .preview-shell .avatar{
    width:110px;height:110px;border-radius:50%;
    background:linear-gradient(135deg,var(--gold) 0%,#f0c97a 100%);
    display:flex;align-items:center;justify-content:center;
    font-size:46px;font-weight:700;color:var(--navy-900);
    box-shadow:0 8px 30px rgba(0,0,0,0.3);
    border:4px solid rgba(255,255,255,0.15);flex-shrink:0;
  }
  .preview-shell .header-text h1{font-size:38px;font-weight:700;letter-spacing:1px;margin-bottom:6px}
  .preview-shell .header-text .role{font-size:17px;color:var(--navy-100);font-weight:300;margin-bottom:14px}
  .preview-shell .header-text .role strong{color:var(--gold);font-weight:600}
  .preview-shell .contact-row{display:flex;flex-wrap:wrap;gap:14px 22px;font-size:13px;color:rgba(255,255,255,0.85)}
  .preview-shell .contact-row span{display:inline-flex;align-items:center;gap:5px}
  .preview-shell .contact-row .ico{
    width:16px;height:16px;border-radius:50%;
    background:rgba(255,255,255,0.15);display:inline-flex;align-items:center;justify-content:center;font-size:10px;
  }
  .preview-shell .tagline{
    background:var(--navy-50);border-bottom:1px solid var(--navy-100);padding:12px 0;
  }
  .preview-shell .tagline-inner{
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;
    font-size:13px;color:var(--navy-800);
  }
  .preview-shell .tagline .pill{
    display:inline-block;padding:3px 10px;background:#fff;border:1px solid var(--navy-100);
    border-radius:999px;margin-right:4px;font-size:12px;color:var(--navy-700);font-weight:500;
  }
  .preview-shell section{padding:36px 0}
  .preview-shell section + section{border-top:1px solid var(--gray-100)}
  .preview-shell .section-title{
    display:flex;align-items:center;gap:12px;margin-bottom:24px;
  }
  .preview-shell .section-title h2{font-size:22px;font-weight:700;color:var(--navy-900);letter-spacing:.5px}
  .preview-shell .section-title .bar{flex:1;height:2px;background:linear-gradient(90deg,var(--navy-100) 0%,transparent 100%)}
  .preview-shell .section-title .num{font-size:13px;font-weight:600;color:var(--gold);font-family:"SF Mono",Menlo,monospace}
  .preview-shell .bio-card{
    background:#fff;border-left:4px solid var(--navy-500);padding:22px 26px;
    border-radius:8px;box-shadow:var(--shadow);font-size:15px;color:var(--gray-700);line-height:1.85;
  }
  .preview-shell .bio-card .highlight{color:var(--navy-700);font-weight:600}
  .preview-shell .stats-grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;
  }
  .preview-shell .stat-card{
    background:#fff;border-radius:10px;padding:22px 20px;
    box-shadow:var(--shadow);position:relative;overflow:hidden;
    border:1px solid var(--gray-100);
  }
  .preview-shell .stat-card::before{
    content:"";position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,var(--navy-500),var(--accent));
  }
  .preview-shell .stat-num{
    font-size:36px;font-weight:800;color:var(--navy-700);
    line-height:1;letter-spacing:-1px;
  }
  .preview-shell .stat-num small{font-size:16px;color:var(--accent);font-weight:600}
  .preview-shell .stat-label{margin-top:8px;font-size:14px;color:var(--gray-700);font-weight:500}
  .preview-shell .stat-sub{margin-top:3px;font-size:11px;color:var(--gray-500)}
  .preview-shell .timeline{position:relative;padding-left:30px}
  .preview-shell .timeline::before{
    content:"";position:absolute;left:10px;top:6px;bottom:6px;
    width:2px;background:linear-gradient(180deg,var(--navy-500),var(--navy-100));
  }
  .preview-shell .tl-item{position:relative;margin-bottom:28px}
  .preview-shell .tl-item:last-child{margin-bottom:0}
  .preview-shell .tl-item::before{
    content:"";position:absolute;left:-26px;top:5px;width:14px;height:14px;
    border-radius:50%;background:#fff;border:3px solid var(--navy-500);
    box-shadow:0 0 0 3px rgba(39,84,196,0.12);
  }
  .preview-shell .tl-period{
    display:inline-block;background:var(--navy-50);color:var(--navy-700);
    padding:2px 10px;border-radius:4px;font-size:12px;font-weight:600;
    font-family:"SF Mono",Menlo,monospace;margin-bottom:8px;
  }
  .preview-shell .tl-title{font-size:18px;font-weight:700;color:var(--navy-900);margin-bottom:3px}
  .preview-shell .tl-company{font-size:13px;color:var(--gold);font-weight:600;margin-bottom:10px}
  .preview-shell .tl-bullets{list-style:none;padding:0}
  .preview-shell .tl-bullets li{
    position:relative;padding-left:20px;margin-bottom:8px;
    color:var(--gray-700);font-size:14px;
  }
  .preview-shell .tl-bullets li::before{
    content:"▸";position:absolute;left:0;top:0;color:var(--navy-500);font-weight:bold;
  }
  .preview-shell .tl-bullets li b{color:var(--navy-800)}
  .preview-shell .skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
  .preview-shell .radar-wrap,.preview-shell .tag-cloud,.preview-shell .tools-card{
    background:#fff;border-radius:10px;padding:20px;
    box-shadow:var(--shadow);border:1px solid var(--gray-100);
  }
  .preview-shell .skill-list{list-style:none;padding:0}
  .preview-shell .skill-list li{margin-bottom:14px}
  .preview-shell .skill-head{
    display:flex;justify-content:space-between;margin-bottom:4px;
    font-size:13px;color:var(--gray-700);
  }
  .preview-shell .skill-head b{color:var(--navy-800);font-weight:600}
  .preview-shell .skill-bar{height:7px;background:var(--gray-100);border-radius:4px;overflow:hidden}
  .preview-shell .skill-fill{height:100%;background:linear-gradient(90deg,var(--navy-500),var(--accent));border-radius:4px}
  .preview-shell .tag-cloud h3,.preview-shell .tools-card h3{
    font-size:15px;color:var(--navy-900);margin-bottom:12px;font-weight:700;
  }
  .preview-shell .tags{display:flex;flex-wrap:wrap;gap:6px}
  .preview-shell .tag{
    padding:5px 12px;background:var(--navy-50);color:var(--navy-700);
    border-radius:5px;font-size:12px;font-weight:500;border:1px solid var(--navy-100);
  }
  .preview-shell .tag.tool{background:#fff7e6;color:#a06900;border-color:#fde8b8}
  .preview-shell .edu-card{
    background:#fff;border-radius:10px;padding:22px;
    box-shadow:var(--shadow);border:1px solid var(--gray-100);
    display:flex;align-items:center;gap:20px;flex-wrap:wrap;
  }
  .preview-shell .edu-logo{
    width:56px;height:56px;border-radius:10px;
    background:linear-gradient(135deg,var(--navy-700),var(--navy-500));
    color:#fff;display:flex;align-items:center;justify-content:center;
    font-size:18px;font-weight:700;flex-shrink:0;
  }
  .preview-shell .edu-info{flex:1;min-width:180px}
  .preview-shell .edu-school{font-size:18px;font-weight:700;color:var(--navy-900)}
  .preview-shell .edu-major{color:var(--gray-700);margin-top:3px;font-size:14px}
  .preview-shell .edu-meta{color:var(--gray-500);font-size:12px;margin-top:4px}
  .preview-shell footer{
    background:var(--navy-900);color:rgba(255,255,255,0.7);
    text-align:center;padding:22px 20px;font-size:12px;
  }
  .preview-shell footer .gold{color:var(--gold)}
  .preview-shell .empty-state{color:var(--gray-500);font-style:italic;font-size:13px;padding:6px 0}

  /* ============== Responsive ============== */
  @media (max-width:1023px){
    .app{grid-template-columns:1fr 1fr}
  }
  @media (max-width:768px){
    .topbar{padding:0 12px;gap:8px}
    .topbar .brand span:last-child{display:none}
    .btn{padding:6px 10px;font-size:12px}
    .tab-toggle{display:flex;background:var(--navy-50);border:1px solid var(--navy-100);border-radius:6px;overflow:hidden}
    .tab-toggle button{
      border:none;background:transparent;padding:6px 12px;font-size:12px;font-weight:600;
      color:var(--navy-800);cursor:pointer;
    }
    .tab-toggle button.active{background:var(--primary);color:#fff}
    .app{grid-template-columns:1fr;height:auto}
    .pane{height:auto}
    .form-pane{border-right:none;border-bottom:1px solid var(--gray-200);display:block}
    .preview-pane{padding:14px}
    .app.preview-mode .form-pane{display:none}
    .app.form-mode .preview-pane{display:none}
    .preview-shell .header-text h1{font-size:28px}
    .preview-shell .avatar{width:80px;height:80px;font-size:32px}
    .preview-shell .skills-grid{grid-template-columns:1fr}
  }

  /* ============== Print ============== */
  @media print{
    .topbar,.form-pane{display:none !important}
    .app{grid-template-columns:1fr;height:auto}
    .preview-pane{background:#fff;padding:0}
    .preview-frame{box-shadow:none;border-radius:0;max-width:100%}
    .preview-shell section{padding:20px 0}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="dot"></span><span>Resume Builder</span></div>
  <div class="tab-toggle" id="tabToggle">
    <button data-mode="form" class="active">Edit</button>
    <button data-mode="preview">Preview</button>
  </div>
  <div class="spacer"></div>
  <button class="btn" id="loadDemoBtn">Load demo</button>
  <button class="btn danger" id="resetBtn">Reset</button>
  <button class="btn" id="exportBtn">Export HTML</button>
  <button class="btn primary" id="printBtn">Print / PDF</button>
</div>

<div class="app form-mode" id="app">
  <!-- ============== Form pane ============== -->
  <div class="pane form-pane" id="formPane">

    <div class="form-section">
      <h3><span class="num">01</span>Profile</h3>
      <div class="form-row cols-2">
        <div class="field">
          <label>Full name</label>
          <input type="text" data-bind="profile.name" placeholder="Zhang Ming">
        </div>
        <div class="field">
          <label>Avatar initials</label>
          <input type="text" data-bind="profile.avatarText" maxlength="2" placeholder="Z">
        </div>
      </div>
      <div class="field" style="margin-bottom:10px">
        <label>Headline / seeking role</label>
        <input type="text" data-bind="profile.role" placeholder="Seeking: Senior Product Manager · B2B SaaS">
        <div class="hint">Use **text** to bold (e.g. Senior **Product Manager**)</div>
      </div>
      <div class="form-row cols-2">
        <div class="field">
          <label>Email</label>
          <input type="text" data-bind="profile.email" placeholder="you@email.com">
        </div>
        <div class="field">
          <label>Phone</label>
          <input type="text" data-bind="profile.phone" placeholder="+86 ...">
        </div>
      </div>
      <div class="form-row cols-2">
        <div class="field">
          <label>Location</label>
          <input type="text" data-bind="profile.location" placeholder="Hangzhou, Zhejiang">
        </div>
        <div class="field">
          <label>LinkedIn / Web</label>
          <input type="text" data-bind="profile.linkedin" placeholder="linkedin.com/in/...">
        </div>
      </div>
      <div class="field" style="margin-top:10px">
        <label>Tagline pills (press Enter to add)</label>
        <div class="tag-input-row" id="pillsRow">
          <input type="text" id="pillsInput" placeholder="e.g. 3 Years in B2B">
        </div>
      </div>
      <div class="field" style="margin-top:10px">
        <label>Right-side note (e.g. availability)</label>
        <input type="text" data-bind="profile.availability" placeholder="27 y/o · ZJU B.Sc. · Available within 1 month">
      </div>
    </div>

    <div class="form-section">
      <h3><span class="num">02</span>Profile summary</h3>
      <div class="field">
        <label>Bio paragraph</label>
        <textarea data-bind="bio" placeholder="3-year B2B SaaS PM with..."></textarea>
        <div class="hint">Wrap key phrases in **double asterisks** to bold them.</div>
      </div>
    </div>

    <div class="form-section">
      <h3><span class="num">03</span>Key highlights</h3>
      <div id="highlightsList"></div>
      <button class="add-btn" id="addHighlightBtn">+ Add highlight</button>
    </div>

    <div class="form-section">
      <h3><span class="num">04</span>Work experience</h3>
      <div id="expList"></div>
      <button class="add-btn" id="addExpBtn">+ Add experience</button>
    </div>

    <div class="form-section">
      <h3><span class="num">05</span>Skills</h3>
      <div style="font-size:12px;color:var(--gray-500);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.3px">Radar axes (3–8 recommended)</div>
      <div id="radarList"></div>
      <button class="add-btn" id="addRadarBtn">+ Add axis</button>
      <div style="margin-top:18px">
        <div style="font-size:12px;color:var(--gray-500);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.3px">Toolbox &amp; methods (press Enter to add)</div>
        <div class="tag-input-row" id="toolsRow">
          <input type="text" id="toolsInput" placeholder="e.g. SQL">
        </div>
      </div>
    </div>

/* ---------- persistence ---------- */
function loadState(){

function saveState(){

/* ---------- helpers ---------- */
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function md(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')}

/* ---------- form bindings ---------- */
function bindInputs(){
  document.querySelectorAll('[data-bind]').forEach(el=>{
    const path = el.getAttribute('data-bind');
    const v = getPath(state, path);
    if(v != null) el.value = v;
    el.addEventListener('input', ()=>{
      setPath(state, path, el.value);
      saveState();
      renderPreview();
    });
  });
  // pills
  const pillsInput = document.getElementById('pillsInput');
  pillsInput.addEventListener('keydown', e=>{
    if(e.key==='Enter' || e.key===','){
      e.preventDefault();
      const v = pillsInput.value.trim().replace(/,$/,'');
      if(v){ state.profile.pills.push(v); pillsInput.value=''; saveState(); renderPills(); renderPreview(); }
    } else if(e.key==='Backspace' && !pillsInput.value && state.profile.pills.length){
      state.profile.pills.pop(); saveState(); renderPills(); renderPreview();
    }
  });
  // tools

      const v = toolsInput.value.trim().replace(/,$/,'');
      if(v){ state.skills.tools.push(v); toolsInput.value=''; saveState(); renderToolsChips(); renderPreview(); }

      state.skills.tools.pop(); saveState(); renderToolsChips(); renderPreview();

}

function getPath(o, p){return p.split('.').reduce((a,k)=>a==null?undefined:a[k], o)}
function setPath(o, p, v){
  const keys = p.split('.');
  const last = keys.pop();
  const parent = keys.reduce((a,k)=>a[k]=a[k]||{}, o);
  parent[last] = v;
}

/* ---------- SVG radar (dynamic) ---------- */
function renderRadarSvg(axes){
  if(!axes.length){
    return '<div class="empty-state" style="padding:60px 0;text-align:center">Add skill axes to draw a radar.</div>';
  }
  const N = axes.length;
  const cx = 200, cy = 200, R = 160;
  const angle = i => (-Math.PI/2) + (2*Math.PI*i)/N; // start at top
  // grid rings
  let grid = '';
  for(let k=1;k<=4;k++){
    const r = R*k/4;
    const pts = Array.from({length:N}, (_,i)=>{
      const a = angle(i);
      return `${cx + r*Math.cos(a)},${cy + r*Math.sin(a)}`;
    }).join(' ');
    grid += `<polygon points="${pts}" opacity="${0.6 - k*0.1}"/>`;
  }
  // axes lines
  let lines = axes.map((_,i)=>{
    const a = angle(i);
    return `<line x1="${cx}" y1="${cy}" x2="${cx + R*Math.cos(a)}" y2="${cy + R*Math.sin(a)}"/>`;
  }).join('');
  // data polygon
  const dataPts = axes.map((ax,i)=>{
    const a = angle(i);
    const r = R * (ax.score/100);
    return `${cx + r*Math.cos(a)},${cy + r*Math.sin(a)}`;
  }).join(' ');
  const dataCircles = axes.map((ax,i)=>{
    const a = angle(i);
    const r = R * (ax.score/100);
    return `<circle cx="${cx + r*Math.cos(a)}" cy="${cy + r*Math.sin(a)}" r="4"/>`;
  }).join('');
  // labels + scores
  const labelOffset = 22;
  const labels = axes.map((ax,i)=>{
    const a = angle(i);
    const lx = cx + (R+labelOffset)*Math.cos(a);
    const ly = cy + (R+labelOffset)*Math.sin(a);
    // horizontal anchor: avoid edge clipping
    const cosA = Math.cos(a);
    let anchor = 'middle';
    if(cosA > 0.2) anchor = 'start';
    else if(cosA < -0.2) anchor = 'end';
    // score position: along axis, slightly inside the data point
    const sr = R * (ax.score/100) - 14;
    const sx = cx + sr*Math.cos(a);
    const sy = cy + sr*Math.sin(a);
    return `
      <text x="${lx}" y="${ly}" font-size="13" font-weight="600" fill="#0a1f44" text-anchor="${anchor}">${esc(ax.name)}</text>
      <text x="${sx}" y="${sy}" font-size="11" fill="#0ea5e9" text-anchor="${anchor}" font-weight="700">${ax.score}</text>
    `;
  }).join('');

  return `
    <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">
      <defs>
        <linearGradient id="rbRadarFill" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#2754c4" stop-opacity="0.45"/>
          <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.25"/>
        </linearGradient>
      </defs>
      <g fill="none" stroke="#d9e3f7" stroke-width="1">${grid}</g>
      <g stroke="#d9e3f7" stroke-width="1">${lines}</g>
      <g fill="url(#rbRadarFill)" stroke="#2754c4" stroke-width="2" stroke-linejoin="round">
        <polygon points="${dataPts}"/>
      </g>
      <g fill="#2754c4">${dataCircles}</g>
      ${labels}
    </svg>
  `;
}

document.getElementById('addExpBtn').addEventListener('click', ()=>{
  state.experiences.push({ period: '', title: '', company: '', bullets: [''] });
  saveState(); renderExperiences(); renderPreview();
});
document.getElementById('addRadarBtn').addEventListener('click', ()=>{

});

document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(confirm('Clear all data and reload the demo resume?')){
    state = JSON.parse(JSON.stringify(DEMO));
    saveState(); rerenderAll();
  }
});
document.getElementById('loadDemoBtn').addEventListener('click', ()=>{

document.getElementById('printBtn').addEventListener('click', ()=>{
  // switch to preview mode on mobile so the print styles behave
  const app = document.getElementById('app');
  app.classList.remove('form-mode'); app.classList.add('preview-mode');
  setTimeout(()=>window.print(), 50);
});

document.getElementById('exportBtn').addEventListener('click', exportHtml);

function exportHtml(){
  const previewHtml = document.getElementById('preview').innerHTML;
  // Build a standalone HTML with the same scoped CSS
  const css = collectPreviewCss();
  const name = (state.profile.name || 'resume').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'') || 'resume';
  const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${esc(state.profile.name || 'Resume')}</title>
<style>${css}</style>
</head>
<body>
<div class="preview-shell">${previewHtml}</div>
</body>
</html>`;
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${name}-resume.html`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

function collectPreviewCss(){
  // Extract the rules we need by name. Simpler: serialize the .preview-shell rules
  // from a <style> we already have. We do it by reading the document's stylesheet
  // and selecting rules whose selector text matches ".preview-shell ...".
  const out = [];
  for(const sheet of document.styleSheets){
    let rules;
    try{ rules = sheet.cssRules; }catch(e){ continue; }
    if(!rules) continue;
    for(const rule of rules){
      if(rule.type !== CSSRule.STYLE_RULE) continue;
      if(/\.preview-shell/.test(rule.selectorText) ||
         /@media\s+print/.test(rule.cssText) ||
         /:root/.test(rule.selectorText)){
        out.push(rule.cssText);
      }
    }
  }
  // Always include :root tokens (navy/gold etc.) so the standalone file renders correctly
  return out.join('\n');
}

/* ---------- mobile tab toggle ---------- */
document.querySelectorAll('#tabToggle button').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('#tabToggle button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    const app = document.getElementById('app');
    app.classList.remove('form-mode','preview-mode');
    app.classList.add(b.dataset.mode + '-mode');
  });
});

/* ---------- init ---------- */
function rerenderAll(){
  // re-populate all inputs
  document.querySelectorAll('[data-bind]').forEach(el=>{
    const v = getPath(state, el.getAttribute('data-bind'));
    if(v != null) el.value = v;
  });
  renderPills();
  renderToolsChips();
  renderHighlights();
  renderExperiences();
  renderRadar();
  renderPreview();
}

bindInputs();
rerenderAll();
